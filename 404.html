<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Vowite</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#C9A84C;--gold-dark:#9C7A2E;--ivory:#FFFDF7;--ivory-dark:#F5EDD8;--espresso:#2C1A0E;--espresso-mid:#5C3D22;--border:rgba(201,168,76,0.2);}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--ivory);color:var(--espresso);overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;}

/* Petals */
.petals{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.petal{position:absolute;opacity:0;animation:fall linear infinite;border-radius:50% 0 50% 0;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:0.6;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}

/* BG */
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(242,196,206,0.2) 0%,transparent 70%);pointer-events:none;}

.content{position:relative;z-index:1;max-width:500px;}

.logo{margin-bottom:2.5rem;}
.logo img{height:48px;width:auto;}

.num{font-family:'Great Vibes',cursive;font-size:120px;color:var(--gold);line-height:1;margin-bottom:0.5rem;opacity:0.8;}

.title{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,4vw,36px);font-weight:500;color:var(--espresso);margin-bottom:0.75rem;line-height:1.2;}
.title em{font-style:italic;color:var(--gold);}

.subtitle{font-size:15px;color:var(--espresso-mid);line-height:1.7;font-weight:300;margin-bottom:2.5rem;max-width:380px;margin-left:auto;margin-right:auto;}

.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-primary{background:var(--espresso);color:var(--ivory);padding:12px 28px;border-radius:100px;font-size:14px;font-weight:500;text-decoration:none;transition:all 0.2s;display:inline-block;}
.btn-primary:hover{background:var(--gold-dark);}
.btn-secondary{background:transparent;color:var(--espresso);padding:12px 28px;border-radius:100px;font-size:14px;font-weight:400;text-decoration:none;border:0.5px solid rgba(44,26,14,0.2);transition:all 0.2s;display:inline-block;}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold-dark);}

.divider{display:flex;align-items:center;gap:10px;justify-content:center;margin:2rem 0;}
.divider span{height:0.5px;width:50px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.4));}
.divider span:last-child{background:linear-gradient(90deg,rgba(201,168,76,0.4),transparent);}
.divider i{font-style:normal;font-size:12px;color:var(--gold);}

.links{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;}
.links a{font-size:13px;color:var(--espresso-mid);text-decoration:none;transition:color 0.2s;}
.links a:hover{color:var(--gold-dark);}
</style>
</head>
<body>
<div class="bg"></div>
<div class="petals" id="petals"></div>

<div class="content">
  <div class="logo">
    <img src="images/logo.png" alt="Vowite">
  </div>

  <div class="num">404</div>

  <h1 class="title">This page seems to have <em>eloped.</em></h1>
  <p class="subtitle">The page you're looking for doesn't exist — but your perfect wedding invite does. Let's get you back on track.</p>

  <div class="actions">
    <a href="index.html" class="btn-primary">Back to home ✦</a>
    <a href="index.html#themes" class="btn-secondary">Browse themes</a>
  </div>

  <div class="divider"><span></span><i>✦</i><span></span></div>

  <div class="links">
    <a href="index.html#themes">Themes</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Done for you</a>
    <a href="about.html">About</a>
  </div>
</div>

<script>
const p=document.getElementById('petals');
['#F2C4CE','#E8D5B0','#C9A84C','#F5EDD8'].forEach(c=>{
  for(let i=0;i<5;i++){
    const el=document.createElement('div');
    el.className='petal';
    const s=Math.random()*8+4;
    el.style.cssText=`width:${s}px;height:${s}px;background:${c};left:${Math.random()*100}%;top:-20px;animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*8}s;`;
    p.appendChild(el);
  }
});
</script>
</body>
</html>
